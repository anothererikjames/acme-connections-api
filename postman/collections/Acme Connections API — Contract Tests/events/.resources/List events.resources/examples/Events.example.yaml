$kind: http-example
request:
  url: "{{baseUrl}}/events?type=<string>&since=<dateTime>"
  method: GET
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    type: <string>
    since: <dateTime>
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
