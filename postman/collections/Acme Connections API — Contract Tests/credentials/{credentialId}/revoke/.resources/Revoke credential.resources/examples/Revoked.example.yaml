$kind: http-example
request:
  url: "{{baseUrl}}/credentials/:credentialId/revoke"
  method: POST
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    credentialId: ""
response:
  statusCode: 204
  statusText: No Content
  body:
    type: text
    content: ""
order: 1000
