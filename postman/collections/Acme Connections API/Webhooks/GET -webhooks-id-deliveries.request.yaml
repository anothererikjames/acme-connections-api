$kind: http-request
name: GET /webhooks/:id/deliveries
url: "{{baseUrl}}/webhooks/{{webhookId}}/deliveries"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has data array', () =>
      pm.expect(pm.response.json().data).to.be.an('array'));

      pm.test('No stuck pending deliveries', () => {
        const stuck = pm.response.json().data.filter(d => {
          return d.status === 'pending' && (Date.now() - new Date(d.createdAt).getTime()) > 300000;
        });
        pm.expect(stuck.length).to.eql(0);
      });
    language: text/javascript
order: 2000
