$kind: http-request
name: POST /connections/:id/test
url: "{{baseUrl}}/connections/{{connectionId}}/test"
method: POST
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has success flag', () =>
      pm.expect(pm.response.json()).to.have.property('success'));

      pm.test('Has latency', () => {
        const json = pm.response.json();
        pm.expect(json.latencyMs).to.be.a('number').and.to.be.above(0);
      });
    language: text/javascript
order: 3000
