$kind: http-request
name: GET /connections/:id
url: "{{baseUrl}}/connections/{{connectionId}}"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Connection has required fields', () => {
        const json = pm.response.json();
        pm.expect(json).to.have.all.keys('id','name','type','partnerId','status','createdAt','updatedAt');
      });
    language: text/javascript
order: 2000
