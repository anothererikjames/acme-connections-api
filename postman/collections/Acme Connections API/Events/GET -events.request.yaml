$kind: http-request
name: GET /events
url: "{{baseUrl}}/events?limit=50"
method: GET
headers:
  Authorization: Bearer {{token}}
queryParams:
  limit: "50"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has data array', () =>
      pm.expect(pm.response.json().data).to.be.an('array'));

      pm.test('Events are sorted newest first', () => {
        const events = pm.response.json().data;
        if (events.length > 1) {
          const first = new Date(events[0].createdAt).getTime();
          const second = new Date(events[1].createdAt).getTime();
          pm.expect(first).to.be.at.least(second);
        }
      });
    language: text/javascript
order: 1000
